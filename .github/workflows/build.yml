name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_pattern: 'release/*.{dmg,zip}'
          - os: windows-latest
            platform: win
            artifact_pattern: 'release/*.exe'
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create default .env (for build)
        run: |
          echo 'DATABASE_URL=postgresql://postgres:postgres@localhost:5432/carton_crm' > backend/.env
          echo 'JWT_SECRET=carton-crm-secret-change-me' >> backend/.env
          echo 'PORT=3001' >> backend/.env

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (${{ matrix.platform }})
        run: npx -w carton-crm-backend prisma generate

      - name: Build backend & frontend
        run: npm run build

      - name: Package Electron (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carton-crm-${{ matrix.platform }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
