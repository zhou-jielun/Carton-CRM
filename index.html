function doCalc() {
  const mode = sessionStorage.getItem('calc_mode') || 'c2b';
  const tongue = parseInt(sessionStorage.getItem('calc_tongue') || '40');
  const resultDiv = document.getElementById('calc-result');

  if (mode === 'c2b') {
    // 纸箱 → 纸板
    const L = parseFloat(document.getElementById('calc-carton-l').value);
    const W = parseFloat(document.getElementById('calc-carton-w').value);
    const H = parseFloat(document.getElementById('calc-carton-h').value);
    if (!L || !W || !H) { Utils.toast('请填写完整的纸箱尺寸'); return; }
    // 保存输入
    sessionStorage.setItem('calc_carton_l', L);
    sessionStorage.setItem('calc_carton_w', W);
    sessionStorage.setItem('calc_carton_h', H);
    const boardL = (L + W) * 2 + tongue;
    const boardW = H + W;
    resultDiv.innerHTML = `
      <div class="calc-result">
        <div class="calc-result-title">计算结果</div>
        <div class="calc-result-grid">
          <div class="calc-result-item">
            <div class="calc-result-label">纸板长</div>
            <div class="calc-result-value">${boardL}<span class="calc-result-unit">mm</span></div>
          </div>
          <div class="calc-result-item">
            <div class="calc-result-label">纸板宽</div>
            <div class="calc-result-value">${boardW}<span class="calc-result-unit">mm</span></div>
          </div>
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);">
          计算依据：纸板长 = (${L} + ${W}) × 2 + ${tongue} = ${boardL}mm；纸板宽 = ${H} + ${W} = ${boardW}mm
        </div>
      </div>
      ${renderCartonPreview(L, W, H, 'front')}
    `;
    lastCalcL = L; lastCalcW = W; lastCalcH = H;
  } else {
    // 纸板 → 纸箱（反推）
    const boardL = parseFloat(document.getElementById('calc-board-l').value);
    const boardW = parseFloat(document.getElementById('calc-board-w').value);
    if (!boardL || !boardW) { Utils.toast('请填写完整的纸板尺寸'); return; }
    sessionStorage.setItem('calc_board_l', boardL);
    sessionStorage.setItem('calc_board_w', boardW);

    const knownL = parseFloat(document.getElementById('calc-known-l').value) || 0;
    const knownW = parseFloat(document.getElementById('calc-known-w').value) || 0;
    const knownH = parseFloat(document.getElementById('calc-known-h').value) || 0;

    let results = [];
    if (knownW > 0) {
      // 已知宽 → 求长、高
      const L = (boardL - tongue) / 2 - knownW;
      const H = boardW - knownW;
      results = [
        { label: '纸箱长', val: L.toFixed(1) },
        { label: '纸箱宽', val: knownW },
        { label: '纸箱高', val: H.toFixed(1) }
      ];
    } else if (knownL > 0) {
      // 已知长 → 求宽、高（需要解方程：L + W = (boardL-tongue)/2，H = boardW - W）
      // W = (boardL - tongue)/2 - L
      const W = (boardL - tongue) / 2 - knownL;
      const H = boardW - W;
      results = [
        { label: '纸箱长', val: knownL },
        { label: '纸箱宽', val: W.toFixed(1) },
        { label: '纸箱高', val: H.toFixed(1) }
      ];
    } else if (knownH > 0) {
      // 已知高 → 求长、宽（H = boardW - W → W = boardW - H，然后 L = (boardL-tongue)/2 - W）
      const W = boardW - knownH;
      const L = (boardL - tongue) / 2 - W;
      results = [
        { label: '纸箱长', val: L.toFixed(1) },
        { label: '纸箱宽', val: W.toFixed(1) },
        { label: '纸箱高', val: knownH }
      ];
    } else {
      // 未输入任何已知尺寸 → 提供最大体积计算选项
      resultDiv.innerHTML = `
        <div class="calc-result" style="border-color:rgba(255,149,0,0.3);background:rgba(255,149,0,0.05);">
          <div class="calc-result-title" style="color:var(--apple-orange);">需要更多信息</div>
          <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;margin-bottom:16px;">
            纸板尺寸反推纸箱尺寸时，通常需要已知<strong>至少一个</strong>纸箱尺寸（长/宽/高其一即可）。<br>
            或者，您也可以计算该纸板能做出的<strong>最大体积</strong>纸箱：
          </div>
          <button class="btn btn-primary" onclick="calcMaxVolume()" style="width:100%;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:6px;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            计算最大体积方案
          </button>
        </div>
      `;
      return;
    }

    const rL = parseFloat(results.find(r=>r.label==='纸箱长').val);
    const rW = parseFloat(results.find(r=>r.label==='纸箱宽').val);
    const rH = parseFloat(results.find(r=>r.label==='纸箱高').val);
    resultDiv.innerHTML = `
      <div class="calc-result">
        <div class="calc-result-title">计算结果（反推）</div>
        <div class="calc-result-grid">
          ${results.map(r => `
            <div class="calc-result-item">
              <div class="calc-result-label">${r.label}</div>
              <div class="calc-result-value">${r.val}<span class="calc-result-unit">mm</span></div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);">
          舌片=${tongue}mm | 纸板长=${boardL}mm | 纸板宽=${boardW}mm
        </div>
      </div>
      ${renderCartonPreview(rL, rW, rH, 'front')}
    `;
    lastCalcL = rL; lastCalcW = rW; lastCalcH = rH;
  }
}

function calcMaxVolume() {
  const boardL = parseFloat(document.getElementById('calc-board-l').value);
  const boardW = parseFloat(document.getElementById('calc-board-w').value);
  const tongue = parseInt(sessionStorage.getItem('calc_tongue') || '40');
  const resultDiv = document.getElementById('calc-result');

  if (!boardL || !boardW) { Utils.toast('请填写完整的纸板尺寸'); return; }

  // 数学推导：
  // 纸板长 = (L + W) × 2 + tongue  →  L + W = (boardL - tongue) / 2 = A
  // 纸板宽 = H + W  →  H = boardW - W = B - W（设 B = boardW）
  // 体积 V = L × W × H = (A - W) × W × (B - W)
  // 对W求导并令其为0：3W² - 2(A+B)W + AB = 0
  // 解得：W = [(A+B) - √(A² - AB + B²)] / 3

  const A = (boardL - tongue) / 2;  // L + W
  const B = boardW;                  // W + H

  const discriminant = Math.sqrt(A * A - A * B + B * B);
  const W = ((A + B) - discriminant) / 3;
  const L = A - W;
  const H = B - W;
  const volume = L * W * H;

  // 验证约束
  if (W <= 0 || L <= 0 || H <= 0) {
    resultDiv.innerHTML = `
      <div class="calc-result" style="border-color:rgba(255,59,48,0.3);background:rgba(255,59,48,0.05);">
        <div class="calc-result-title" style="color:var(--apple-red);">无法计算</div>
        <div style="font-size:13px;color:var(--text-secondary);line-height:1.8;">
          当前纸板尺寸无法构成有效的纸箱，请检查纸板尺寸和舌片设置。
        </div>
      </div>
    `;
    return;
  }

  resultDiv.innerHTML = `
    <div class="calc-result" style="border-color:rgba(52,199,89,0.3);background:linear-gradient(135deg, rgba(52,199,89,0.05) 0%, rgba(0,122,255,0.05) 100%);">
      <div class="calc-result-title" style="color:var(--apple-green);">最大体积方案</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">在纸板 ${boardL}×${boardW}mm 的约束下，体积最大的纸箱尺寸</div>
      <div class="calc-result-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:12px;">
        <div class="calc-result-item">
          <div class="calc-result-label">纸箱长</div>
          <div class="calc-result-value">${L.toFixed(1)}<span class="calc-result-unit">mm</span></div>
        </div>
        <div class="calc-result-item">
          <div class="calc-result-label">纸箱宽</div>
          <div class="calc-result-value">${W.toFixed(1)}<span class="calc-result-unit">mm</span></div>
        </div>
        <div class="calc-result-item">
          <div class="calc-result-label">纸箱高</div>
          <div class="calc-result-value">${H.toFixed(1)}<span class="calc-result-unit">mm</span></div>
        </div>
      </div>
      <div class="calc-result-item" style="text-align:center;background:rgba(52,199,89,0.08);">
        <div class="calc-result-label" style="color:var(--apple-green);">最大体积</div>
        <div class="calc-result-value" style="color:var(--apple-green);font-size:28px;">${(volume / 1000000).toFixed(3)}<span class="calc-result-unit">m³</span></div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">= ${Math.round(volume).toLocaleString()} mm³</div>
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);line-height:1.8;">
        数学原理：令 V = L×W×H，在约束 L+W=${A.toFixed(1)}、W+H=${B.toFixed(1)} 下求极值<br>
        求导得最优解：W = [(${A.toFixed(1)}+${B.toFixed(1)}) − √(${A.toFixed(1)}² − ${A.toFixed(1)}×${B.toFixed(1)} + ${B.toFixed(1)}²)] / 3 = ${W.toFixed(1)}mm
      </div>
    </div>
    ${renderCartonPreview(L, W, H)}
  `;
  setTimeout(function() {
    var svg = resultDiv.querySelector('.carton-preview svg');
    if (svg && typeof initCarton3D === 'function') initCarton3D(svg.id, L, W, H);
  }, 100);
}

/* 纸箱视图切换 */
let lastCalcL = 0, lastCalcW = 0, lastCalcH = 0;
function reRenderCartonView(view) {
  const resultDiv = document.getElementById('calc-result');
  if (!resultDiv) return;
  // 找到现有的 carton-preview div
  const previewDiv = resultDiv.querySelector('.carton-preview');
  if (!previewDiv) return;
  // 重新生成 SVG
  const svgHtml = renderCartonPreview(lastCalcL, lastCalcW, lastCalcH, view);
  // 替换整个 preview div 的 innerHTML
  previewDiv.outerHTML = svgHtml;
}

/* ================================================================
   纸箱3D SVG 渲染器（打开盖子的RSC纸箱 + 简化透视）
   支持 view 参数：front(主视图) / left(左视图) / top(俯视图) / right(侧视图)
   ================================================================ */
function renderCartonPreview(L, W, H, view) {
  view = view || 'front';
  if (!L || !W || !H || L <= 0 || W <= 0 || H <= 0) return '';

  const maxDim = Math.max(L, W, H);
  const scale = 200 / maxDim;
  const sL = L * scale, sW = W * scale, sH = H * scale;

  // 视图按钮
  const btns = [{k:'front',l:'主视图'},{k:'left',l:'左视图'},{k:'top',l:'俯视图'},{k:'right',l:'侧视图'}];
  let btnHtml = '<div class="carton-view-btns">';
  btns.forEach(b => { btnHtml += '<button class="carton-view-btn'+(b.k===view?' active':'')+'" onclick="reRenderCartonView(\''+b.k+'\')">'+b.l+'</button>'; });
  btnHtml += '</div>';

  const CX = 220, CY = 210, uid = Math.random().toString(36).slice(2,8);
  const viewNames = {front:'主视图',left:'左视图',top:'俯视图',right:'侧视图'};
  const cF='#C4956A', cFD='#A87B4F', cS='#A87B4F', cSD='#8B6238';
  const cB='#6B4A2A', cBD='#5C3D1E', cBot='#5C3D1E', cBotD='#4A3018';
  const cFlap='#8B6238', cFlapD='#7A5430', cEdge='#4A3018';
  const poly = pts => pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ')+' Z';

  let svgBody = '', labelSvg = '';

  if (view === 'front' || view === 'left' || view === 'right') {
    // 通用3D视图：主面 + 深度面 + 翻盖
    const isRight = view === 'right';
    const isLeft = view === 'left';
    const mainW = isLeft || isRight ? sW : sL;  // 主面宽度
    const mainH = sH;                             // 主面高度
    const depth = isLeft || isRight ? sL : sW;    // 深度尺寸
    const dx = isRight ? -depth * 0.45 : depth * 0.45;
    const dy = -depth * 0.32;

    // 主面4点
    const fBL = {x: CX - mainW/2, y: CY};
    const fBR = {x: CX + mainW/2, y: CY};
    const fTR = {x: CX + mainW/2, y: CY - mainH};
    const fTL = {x: CX - mainW/2, y: CY - mainH};
    // 深度面4点
    const bBL = {x: fBL.x + dx, y: fBL.y + dy};
    const bBR = {x: fBR.x + dx, y: fBR.y + dy};
    const bTR = {x: fTR.x + dx, y: fTR.y + dy};
    const bTL = {x: fTL.x + dx, y: fTL.y + dy};

    // 翻盖
    const flapLen = depth * 0.45;
    const ffL = {x: fTL.x - 2, y: fTL.y - flapLen * 0.9};
    const ffR = {x: fTR.x + 2, y: fTR.y - flapLen * 0.9};
    const fbL = {x: bTL.x - 2, y: bTL.y - flapLen * 0.85};
    const fbR = {x: bTR.x + 2, y: bTR.y - flapLen * 0.85};
    const frL = {x: fTR.x + mainW * 0.35, y: fTR.y - mainW * 0.12};
    const frR = {x: bTR.x + mainW * 0.30, y: bTR.y - mainW * 0.10};

    // 阴影
    const sx = (fBL.x + bBR.x) / 2;
    const sy = Math.max(fBL.y, fBR.y, bBL.y, bBR.y) + 16;

    svgBody = `
      <ellipse cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" rx="${(mainW*0.7).toFixed(1)}" ry="${(Math.max(mainW,depth)*0.18).toFixed(1)}" fill="rgba(0,0,0,0.10)"/>
      <path d="${poly([fBL,fBR,bBR,bBL])}" fill="url(#gBot${uid})" stroke="${cEdge}" stroke-width="0.8" stroke-linejoin="round"/>
      <path d="${poly([fBL,fBR,bBR,bBL])}" fill="url(#cor${uid})" opacity="0.30" pointer-events="none"/>
      <path d="${poly([bBL,bBR,bTR,bTL])}" fill="url(#gB${uid})" stroke="${cEdge}" stroke-width="0.8" stroke-linejoin="round"/>
      <path d="${poly([bBL,bBR,bTR,bTL])}" fill="url(#cor${uid})" opacity="0.25" pointer-events="none"/>
      <path d="${poly([bTL,bTR,fbR,fbL])}" fill="url(#gFlap${uid})" stroke="${cEdge}" stroke-width="0.8" stroke-linejoin="round"/>
      <line x1="${bTL.x.toFixed(1)}" y1="${bTL.y.toFixed(1)}" x2="${bTR.x.toFixed(1)}" y2="${bTR.y.toFixed(1)}" stroke="rgba(74,48,24,0.35)" stroke-width="0.8" stroke-dasharray="3,2"/>
      <path d="${poly([fBR,bBR,bTR,fTR])}" fill="url(#gS${uid})" stroke="${cEdge}" stroke-width="1" stroke-linejoin="round"/>
      <path d="${poly([fTR,bTR,frR,frL])}" fill="url(#gFlap${uid})" stroke="${cEdge}" stroke-width="0.8" stroke-linejoin="round"/>
      <line x1="${fTR.x.toFixed(1)}" y1="${fTR.y.toFixed(1)}" x2="${bTR.x.toFixed(1)}" y2="${bTR.y.toFixed(1)}" stroke="rgba(74,48,24,0.35)" stroke-width="0.8" stroke-dasharray="3,2"/>
      <path d="${poly([fTL,fTR,ffR,ffL])}" fill="url(#gFlap${uid})" stroke="${cEdge}" stroke-width="0.8" stroke-linejoin="round"/>
      <line x1="${fTL.x.toFixed(1)}" y1="${fTL.y.toFixed(1)}" x2="${fTR.x.toFixed(1)}" y2="${fTR.y.toFixed(1)}" stroke="rgba(74,48,24,0.40)" stroke-width="0.8" stroke-dasharray="3,2"/>
      <path d="${poly([fBL,fBR,fTR,fTL])}" fill="url(#gFront${uid})" stroke="${cEdge}" stroke-width="1" stroke-linejoin="round"/>
      <path d="${poly([fBL,fBR,fTR,fTL])}" fill="url(#cor${uid})" opacity="0.35" pointer-events="none"/>
      <path d="M${fBL.x.toFixed(1)},${fBL.y.toFixed(1)} L${(fBL.x+2).toFixed(1)},${fBL.y.toFixed(1)} L${(fTL.x+2).toFixed(1)},${fTL.y.toFixed(1)} L${fTL.x.toFixed(1)},${fTL.y.toFixed(1)} Z" fill="rgba(255,255,255,0.08)" pointer-events="none"/>
      <line x1="${fTL.x.toFixed(1)}" y1="${fTL.y.toFixed(1)}" x2="${fTR.x.toFixed(1)}" y2="${fTR.y.toFixed(1)}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <rect x="${((fBL.x+fBR.x)/2 - 5).toFixed(1)}" y="${Math.min(fTL.y,fBL.y).toFixed(1)}" width="10" height="${Math.abs(fBL.y-fTL.y).toFixed(1)}" fill="rgba(255,255,255,0.10)" pointer-events="none"/>
      <line x1="${((fBL.x+fBR.x)/2).toFixed(1)}" y1="${fTL.y.toFixed(1)}" x2="${((fBL.x+fBR.x)/2).toFixed(1)}" y2="${fBL.y.toFixed(1)}" stroke="rgba(255,255,255,0.16)" stroke-width="1.2" pointer-events="none"/>
    `;

    // 标注
    const lp = 24;
    if (view === 'front') {
      // 长=底边  高=右侧  宽=斜向
      labelSvg += `<line x1="${fBL.x.toFixed(1)}" y1="${(fBL.y+lp).toFixed(1)}" x2="${fBR.x.toFixed(1)}" y2="${(fBR.y+lp).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${fBL.x.toFixed(1)}" y1="${(fBL.y+4).toFixed(1)}" x2="${fBL.x.toFixed(1)}" y2="${(fBL.y+lp+2).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${fBR.x.toFixed(1)}" y1="${(fBR.y+4).toFixed(1)}" x2="${fBR.x.toFixed(1)}" y2="${(fBR.y+lp+2).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${((fBL.x+fBR.x)/2).toFixed(1)}" y="${(fBL.y+lp+14).toFixed(1)}" text-anchor="middle" class="carton-dim-label">长 ${Math.round(L)}mm</text>`;
      labelSvg += `<line x1="${(fBR.x+lp).toFixed(1)}" y1="${fBR.y.toFixed(1)}" x2="${(fTR.x+lp).toFixed(1)}" y2="${fTR.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fBR.x+4).toFixed(1)}" y1="${fBR.y.toFixed(1)}" x2="${(fBR.x+lp+2).toFixed(1)}" y2="${fBR.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fTR.x+4).toFixed(1)}" y1="${fTR.y.toFixed(1)}" x2="${(fTR.x+lp+2).toFixed(1)}" y2="${fTR.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${(fBR.x+lp+6).toFixed(1)}" y="${((fBR.y+fTR.y)/2+4).toFixed(1)}" text-anchor="start" class="carton-dim-label">高 ${Math.round(H)}mm</text>`;
      labelSvg += `<line x1="${(fBR.x+lp+4).toFixed(1)}" y1="${(fBR.y-lp*0.35).toFixed(1)}" x2="${(bBR.x+lp+4).toFixed(1)}" y2="${(bBR.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fBR.x+4).toFixed(1)}" y1="${fBR.y.toFixed(1)}" x2="${(fBR.x+lp+4).toFixed(1)}" y2="${(fBR.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(bBR.x+4).toFixed(1)}" y1="${bBR.y.toFixed(1)}" x2="${(bBR.x+lp+4).toFixed(1)}" y2="${(bBR.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${((fBR.x+bBR.x)/2+lp+4).toFixed(1)}" y="${((fBR.y+bBR.y)/2-lp*0.35-4).toFixed(1)}" text-anchor="start" class="carton-dim-label">宽 ${Math.round(W)}mm</text>`;
    } else if (view === 'left') {
      labelSvg += `<line x1="${fBL.x.toFixed(1)}" y1="${(fBL.y+lp).toFixed(1)}" x2="${fBR.x.toFixed(1)}" y2="${(fBR.y+lp).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${fBL.x.toFixed(1)}" y1="${(fBL.y+4).toFixed(1)}" x2="${fBL.x.toFixed(1)}" y2="${(fBL.y+lp+2).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${fBR.x.toFixed(1)}" y1="${(fBR.y+4).toFixed(1)}" x2="${fBR.x.toFixed(1)}" y2="${(fBR.y+lp+2).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${((fBL.x+fBR.x)/2).toFixed(1)}" y="${(fBL.y+lp+14).toFixed(1)}" text-anchor="middle" class="carton-dim-label">宽 ${Math.round(W)}mm</text>`;
      labelSvg += `<line x1="${(fBR.x+lp).toFixed(1)}" y1="${fBR.y.toFixed(1)}" x2="${(fTR.x+lp).toFixed(1)}" y2="${fTR.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fBR.x+4).toFixed(1)}" y1="${fBR.y.toFixed(1)}" x2="${(fBR.x+lp+2).toFixed(1)}" y2="${fBR.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fTR.x+4).toFixed(1)}" y1="${fTR.y.toFixed(1)}" x2="${(fTR.x+lp+2).toFixed(1)}" y2="${fTR.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${(fBR.x+lp+6).toFixed(1)}" y="${((fBR.y+fTR.y)/2+4).toFixed(1)}" text-anchor="start" class="carton-dim-label">高 ${Math.round(H)}mm</text>`;
      labelSvg += `<line x1="${(fBR.x+lp+4).toFixed(1)}" y1="${(fBR.y-lp*0.35).toFixed(1)}" x2="${(bBR.x+lp+4).toFixed(1)}" y2="${(bBR.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fBR.x+4).toFixed(1)}" y1="${fBR.y.toFixed(1)}" x2="${(fBR.x+lp+4).toFixed(1)}" y2="${(fBR.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(bBR.x+4).toFixed(1)}" y1="${bBR.y.toFixed(1)}" x2="${(bBR.x+lp+4).toFixed(1)}" y2="${(bBR.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${((fBR.x+bBR.x)/2+lp+4).toFixed(1)}" y="${((fBR.y+bBR.y)/2-lp*0.35-4).toFixed(1)}" text-anchor="start" class="carton-dim-label">长 ${Math.round(L)}mm</text>`;
    } else if (view === 'right') {
      // 高标注在左侧
      labelSvg += `<line x1="${fBL.x.toFixed(1)}" y1="${(fBL.y+lp).toFixed(1)}" x2="${fBR.x.toFixed(1)}" y2="${(fBR.y+lp).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${fBL.x.toFixed(1)}" y1="${(fBL.y+4).toFixed(1)}" x2="${fBL.x.toFixed(1)}" y2="${(fBL.y+lp+2).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${fBR.x.toFixed(1)}" y1="${(fBR.y+4).toFixed(1)}" x2="${fBR.x.toFixed(1)}" y2="${(fBR.y+lp+2).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${((fBL.x+fBR.x)/2).toFixed(1)}" y="${(fBL.y+lp+14).toFixed(1)}" text-anchor="middle" class="carton-dim-label">宽 ${Math.round(W)}mm</text>`;
      labelSvg += `<line x1="${(fBL.x-lp).toFixed(1)}" y1="${fBL.y.toFixed(1)}" x2="${(fTL.x-lp).toFixed(1)}" y2="${fTL.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fBL.x-4).toFixed(1)}" y1="${fBL.y.toFixed(1)}" x2="${(fBL.x-lp-2).toFixed(1)}" y2="${fBL.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fTL.x-4).toFixed(1)}" y1="${fTL.y.toFixed(1)}" x2="${(fTL.x-lp-2).toFixed(1)}" y2="${fTL.y.toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${(fBL.x-lp-6).toFixed(1)}" y="${((fBL.y+fTL.y)/2+4).toFixed(1)}" text-anchor="end" class="carton-dim-label">高 ${Math.round(H)}mm</text>`;
      labelSvg += `<line x1="${(fBL.x-lp-4).toFixed(1)}" y1="${(fBL.y-lp*0.35).toFixed(1)}" x2="${(bBL.x-lp-4).toFixed(1)}" y2="${(bBL.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(fBL.x-4).toFixed(1)}" y1="${fBL.y.toFixed(1)}" x2="${(fBL.x-lp-4).toFixed(1)}" y2="${(fBL.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<line x1="${(bBL.x-4).toFixed(1)}" y1="${bBL.y.toFixed(1)}" x2="${(bBL.x-lp-4).toFixed(1)}" y2="${(bBL.y-lp*0.35).toFixed(1)}" class="carton-dim-line"/>`;
      labelSvg += `<text x="${((fBL.x+bBL.x)/2-lp-4).toFixed(1)}" y="${((fBL.y+bBL.y)/2-lp*0.35-4).toFixed(1)}" text-anchor="end" class="carton-dim-label">长 ${Math.round(L)}mm</text>`;
    }

  } else if (view === 'top') {
    // 俯视图：底面 + 四周翻盖（2D展开）
    const bw = sL, bh = sW;
    const bCX = 220, bCY = 170;
    const bBL = {x: bCX - bw/2, y: bCY + bh/2};
    const bBR = {x: bCX + bw/2, y: bCY + bh/2};
    const bTR = {x: bCX + bw/2, y: bCY - bh/2};
    const bTL = {x: bCX - bw/2, y: bCY - bh/2};

    const fLen = sW * 0.45; // 前后翻盖
    const sLen = sL * 0.45; // 左右翻盖
    const ffL = {x: bTL.x, y: bTL.y - fLen};
    const ffR = {x: bTR.x, y: bTR.y - fLen};
    const fbL = {x: bBL.x, y: bBL.y + fLen};
    const fbR = {x: bBR.x, y: bBR.y + fLen};
    const flL = {x: bTL.x - sLen, y: bTL.y};
    const flR = {x: bBL.x - sLen, y: bBL.y};
    const frL = {x: bTR.x + sLen, y: bTR.y};
    const frR = {x: bBR.x + sLen, y: bBR.y};

    svgBody = `
      <path d="${poly([flL,bTL,bBL,flR])}" fill="url(#gFlap${uid})" stroke="${cEdge}" stroke-width="0.8" stroke-linejoin="round"/>
      <line x1="${bTL.x.toFixed(1)}" y1="${bTL.y.toFixed(1)}" x2="${flL.x.toFixed(1)}" y2="${flL.y.toFixed(1)}" stroke="rgba(74,48,24,0.35)" stroke-width="0.8" stroke-dasharray="3,2"/>
      <path d="${poly([ffL,bTL,bTR,ffR])}" fill="url(#gFlap${uid})" stroke="${cEdge}" stroke-width="0.8" stroke-linejoin="round"/>
      <line x1="${bTL.x.toFixed(1)}" y1="${bTL.y.toFixed(1)}" x2="${ffL.x.toFixed(1)}" y2="${ffL.y.toFixed(1)}" stroke="rgba(74,48,24,0.35)" stroke-width="0.8" stroke-dasharray="3,2"/>
      <path d="${poly([bBL,bBR,bTR,bTL])}" fill="url(#gBot${uid})" stroke="${cEdge}" stroke-width="1" stroke-linejoin="round"/>
      <path d="${poly([bBL,bBR,bTR,bTL])}" fill="url(#cor${uid})" opacity="0.30" pointer-events="none"/>
      <path d="${poly([frL,bTR,bBR,frR])}" fill="url(#gFlap${uid})" stroke="${cEdge}" stroke-width="0.8" stroke-linejoin="round"/>
      <line x1="${bTR.x.toFixed(1)}" y1="${bTR.y.toFixed(1)}" x2="${frL.x.toFixed(1)}" y2="${frL.y.toFixed(1)}" stroke="rgba(74,48,24,0.35)" stroke-width="0.8" stroke-dasharray="3,2"/>

    `;

    const lp = 22;
    labelSvg += `<line x1="${bBL.x.toFixed(1)}" y1="${(bBL.y+lp).toFixed(1)}" x2="${bBR.x.toFixed(1)}" y2="${(bBR.y+lp).toFixed(1)}" class="carton-dim-line"/>`;
    labelSvg += `<line x1="${bBL.x.toFixed(1)}" y1="${(bBL.y+4).toFixed(1)}" x2="${bBL.x.toFixed(1)}" y2="${(bBL.y+lp+2).toFixed(1)}" class="carton-dim-line"/>`;
    labelSvg += `<line x1="${bBR.x.toFixed(1)}" y1="${(bBR.y+4).toFixed(1)}" x2="${bBR.x.toFixed(1)}" y2="${(bBR.y+lp+2).toFixed(1)}" class="carton-dim-line"/>`;
    labelSvg += `<text x="${((bBL.x+bBR.x)/2).toFixed(1)}" y="${(bBL.y+lp+14).toFixed(1)}" text-anchor="middle" class="carton-dim-label">长 ${Math.round(L)}mm</text>`;
    labelSvg += `<line x1="${(bBL.x-lp).toFixed(1)}" y1="${bBL.y.toFixed(1)}" x2="${(bTL.x-lp).toFixed(1)}" y2="${bTL.y.toFixed(1)}" class="carton-dim-line"/>`;
    labelSvg += `<line x1="${(bBL.x-4).toFixed(1)}" y1="${bBL.y.toFixed(1)}" x2="${(bBL.x-lp-2).toFixed(1)}" y2="${bBL.y.toFixed(1)}" class="carton-dim-line"/>`;
    labelSvg += `<line x1="${(bTL.x-4).toFixed(1)}" y1="${bTL.y.toFixed(1)}" x2="${(bTL.x-lp-2).toFixed(1)}" y2="${bTL.y.toFixed(1)}" class="carton-dim-line"/>`;
    labelSvg += `<text x="${(bBL.x-lp-6).toFixed(1)}" y="${((bBL.y+bTL.y)/2+4).toFixed(1)}" text-anchor="end" class="carton-dim-label">宽 ${Math.round(W)}mm</text>`;
  }

  return `
    <div class="carton-preview">
      ${btnHtml}
      <svg viewBox="0 0 440 340" xmlns="http://www.w3.org/2000/svg"
           style="width:100%;max-width:440px;height:auto;display:block;margin:0 auto;user-select:none;">
        <defs>
          <linearGradient id="gFront${uid}" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="${cFD}"/><stop offset="20%" stop-color="${cF}"/><stop offset="80%" stop-color="${cF}"/><stop offset="100%" stop-color="${cFD}"/></linearGradient>

          <linearGradient id="gB${uid}" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="${cB}"/><stop offset="100%" stop-color="${cBD}"/></linearGradient>
          <linearGradient id="gBot${uid}" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="${cBotD}"/><stop offset="100%" stop-color="${cBot}"/></linearGradient>
          <linearGradient id="gFlap${uid}" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="${cFlap}"/><stop offset="100%" stop-color="${cFlapD}"/></linearGradient>
          <pattern id="cor${uid}" patternUnits="userSpaceOnUse" width="10" height="5"><rect width="10" height="5" fill="transparent"/><line x1="0" y1="4.5" x2="10" y2="4.5" stroke="rgba(60,35,15,0.14)" stroke-width="0.7"/></pattern>
        </defs>
        ${svgBody}
        ${labelSvg}
      </svg>
      <div style="text-align:center;font-size:11px;color:var(--text-secondary);margin-top:6px;opacity:0.7;">📐 ${viewNames[view]}</div>

}

const modal = document.getElementById('modal-overlay');
const modalBody = document.getElementById('modal-body');

function openModal(html) {
  modalBody.innerHTML = html;
  modal.classList.add('open');
}

function closeModal() {
  modal.classList.remove('open');
}
// 点击遮罩关闭（点击 modal-content 外部即关闭）
modal.addEventListener('click', (e) => {
  if (!modalBody.contains(e.target)) closeModal();
});

// 标签输入辅助函数
function addTagChip() {
  const input = document.getElementById('tag-input-field');
  const tag = input.value.trim();
  if (!tag) return;
  const hidden = document.getElementById('tags-hidden');
  const existing = hidden.value ? hidden.value.split(',').filter(Boolean) : [];
  if (existing.includes(tag)) { input.value = ''; return; }
  const wrap = document.getElementById('tag-input-wrap');
  const chip = document.createElement('span');
  chip.className = 'customer-tag';
  chip.innerHTML = tag + '<span class="customer-tag-del" data-tag="' + tag + '" onclick="event.stopPropagation();removeTagChip(this)">×</span>';
  wrap.insertBefore(chip, input);
  existing.push(tag);
  hidden.value = existing.join(',');
  input.value = '';
}
function removeTagChip(el) {
  const tag = el.dataset.tag;
  el.parentElement.remove();
  const hidden = document.getElementById('tags-hidden');
  const existing = hidden.value ? hidden.value.split(',').filter(Boolean) : [];
  hidden.value = existing.filter(t => t !== tag).join(',');
}

// 保存客户
function saveCustomer(e) {
  e.preventDefault();
  const form = document.getElementById('customer-form');
  const fd = new FormData(form);
  const id = fd.get('id');
  const isEdit = !!id;

  // 收集意向设备
  const equipLabels = document.querySelectorAll('#equipment-checkboxes .checkbox-item.active');
  const targetEquipment = Array.from(equipLabels).map(el => el.querySelector('input').value);

  // 收集标签
  const tagsStr = document.getElementById('tags-hidden').value;
  const tags = tagsStr ? tagsStr.split(',').filter(Boolean) : [];

  const data = {
    name: fd.get('name').trim(),
    country: fd.get('country').trim(),
    customerType: fd.get('customerType') || '',  // 客户类型：distributor / end_user
    mainProduct: fd.get('mainProduct').trim(),
    contactPerson: fd.get('contactPerson').trim(),
    email: fd.get('email').trim(),
    whatsapp: fd.get('whatsapp').trim(),
    website: fd.get('website').trim(),
    source: fd.get('source'),
    companySize: fd.get('companySize'),
    techContact: fd.get('techContact').trim(),
    firstContactDate: fd.get('firstContactDate'),
    foundedDate: fd.get('foundedDate'),
    currentCapacity: fd.get('currentCapacity').trim(),
    currentEquipment: fd.get('currentEquipment').trim(),
    mainIndustries: fd.get('mainIndustries').trim(),
    corePainPoints: fd.get('corePainPoints').trim(),
    targetEquipment,
    equipmentSpecs: fd.get('equipmentSpecs').trim(),
    budget: fd.get('budget').trim(),
    expectedPurchaseTime: fd.get('expectedPurchaseTime'),
    needsFactoryInspection: fd.get('needsFactoryInspection') === '1',
    stage: fd.get('stage'),
    priority: fd.get('priority'),
    nextFollowUp: fd.get('nextFollowUp'),
    tags
  };

  if (!data.name || !data.country || !data.customerType) { Utils.toast('请填写客户名称、国家和客户类型'); return false; }

  const customers = Storage.getCustomers();
  if (isEdit) {
    const idx = customers.findIndex(c => c.id === id);
    if (idx !== -1) {
      customers[idx] = { ...customers[idx], ...data, updatedAt: new Date().toISOString() };
    }
  } else {
    data.id = Utils.id();
    data.createdAt = new Date().toISOString();
    data.updatedAt = data.createdAt;
    customers.unshift(data);
  }
  Storage.setCustomers(customers);
  closeModal();
  Utils.toast(isEdit ? '客户已更新' : '客户已添加');
  updateBellBadge();
  Router.handleRoute();
  return false;
}

function showGenerateModal(customerId, type) {

      <div class="form-group">

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
        <button class="btn btn-primary" id="copy-btn" onclick="copyGeneratedContent()">📋 Copy to Clipboard</button>
      </div>
    </div>
  `);
}

function applyGenerateTemplate(select, customerId, type) {
  const idx = parseInt(select.value);
  if (isNaN(idx)) return;
  const c = Utils.getCustomer(customerId);
  if (!c) return;
  const templates = type === 'whatsapp'
    ? (Storage.get().config.whatsappTemplates || [])
    : (Storage.get().config.emailTemplates || []);
  if (idx >= 0 && idx < templates.length) {
    document.getElementById('generate-content').value = replacePlaceholders(templates[idx].content, c);
  }
}

function copyGeneratedContent() {
  const textarea = document.getElementById('generate-content');
  if (!textarea || !textarea.value.trim()) { Utils.toast('没有内容可复制'); return; }
  navigator.clipboard.writeText(textarea.value).then(() => {
    Utils.toast('Copied!');
  }).catch(() => {
    textarea.select();
    document.execCommand('copy');
    Utils.toast('Copied!');
  });
}

function saveFollowUp(e, customerId) {
  e.preventDefault();
  const form = document.getElementById('followup-form');
  const fd = new FormData(form);

  Defaults.saveFollowUpMethod(fd.get('method'));
  const data = {
    id: Utils.id(),
    customerId,
    date: normalizeDate(fd.get('date')),
    method: fd.get('method'),
    content: fd.get('content').trim(),
    nextAction: fd.get('nextAction').trim(),
    nextFollowUpDate: normalizeDate(fd.get('nextFollowUpDate')),
    createdAt: new Date().toISOString(),
    updatedAt: null
  };

  const followups = Storage.getFollowups();
  followups.unshift(data);
  Storage.setFollowups(followups);

  // 如果设置了下次跟进时间，更新客户的下次跟进时间
  if (data.nextFollowUpDate) {
    const customers = Storage.getCustomers();
    const c = customers.find(x => x.id === customerId);
    if (c) {
      // 只更新，不变小
      if (!c.nextFollowUp || data.nextFollowUpDate < c.nextFollowUp) {
        c.nextFollowUp = data.nextFollowUpDate;

  if (!f) return false;

  f.date = normalizeDate(fd.get('date'));
  f.method = fd.get('method');
  f.content = fd.get('content').trim();
  f.nextAction = fd.get('nextAction').trim();
  f.nextFollowUpDate = normalizeDate(fd.get('nextFollowUpDate'));
  f.updatedAt = new Date().toISOString();

  Storage.setFollowups(followups);

  // 更新客户的下次跟进时间（如果编辑后的日期更早）
  if (f.nextFollowUpDate) {
    const customers = Storage.getCustomers();
    const c = customers.find(x => x.id === customerId);
    if (c) {

        c.nextFollowUp = f.nextFollowUpDate;
        c.updatedAt = new Date().toISOString();
        Storage.setCustomers(customers);
      }
    }
  }

  closeModal();
  Utils.toast('跟进记录已更新');
  updateBellBadge();
  Router.handleRoute();
  return false;
}

function recalcQuoteTotal() {
  const prices = document.querySelectorAll('input[name="item_price[]"]');

  for (let i = 0; i < prices.length; i++) {
    const qty = parseFloat(qtys[i]?.value || 0);
    const price = parseFloat(prices[i]?.value || 0);
    total += qty * price;
  }
  document.getElementById('quote-total-display').textContent = '$' + total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function saveQuotation(e) {
  e.preventDefault();
  const form = document.getElementById('quotation-form');
  const fd = new FormData(form);

  const customerId = fd.get('customerId');
  if (!customerId) { Utils.toast('请选择客户'); return false; }

  // 收集设备明细
  const names = fd.getAll('item_name[]');
  const models = fd.getAll('item_model[]');
  const qtys = fd.getAll('item_qty[]');
  const prices = fd.getAll('item_price[]');
  const items = [];
  let totalAmount = 0;

  for (let i = 0; i < names.length; i++) {
    if (!names[i].trim()) continue;
    const qty = parseFloat(qtys[i]) || 0;
    const price = parseFloat(prices[i]) || 0;
    const total = qty * price;
    totalAmount += total;
    items.push({
      name: names[i].trim(),
      model: models[i]?.trim() || '',
      quantity: qty,
      unitPrice: price,
      totalPrice: total
    });
  }

  if (items.length === 0) { Utils.toast('请至少添加一项设备'); return false; }

  const data = {
    id: Utils.id(),
    quoteNumber: Utils.nextQuoteNumber(),
    customerId,
    customerName: fd.get('customerName') || '',
    date: fd.get('date'),
    items,
    totalAmount,
    status: fd.get('status'),
    paymentTerms: fd.get('paymentTerms').trim(),
    deliveryTerms: fd.get('deliveryTerms').trim(),
    validityDays: parseInt(fd.get('validityDays')) || 30,
    notes: fd.get('notes').trim(),
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };

  const quotations = Storage.getQuotations();
  quotations.unshift(data);
  Storage.setQuotations(quotations);

  // 更新报价单编号序号
  const upd = Storage.getConfig();
  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth() + 1;
  let seq = 1;
  if (upd.lastQuoteNumber && upd.lastQuoteNumber.year === yr && upd.lastQuoteNumber.month === mo) {
    seq = upd.lastQuoteNumber.sequence + 1;
  }
  upd.lastQuoteNumber = { year: yr, month: mo, sequence: seq };
  Storage.setConfig(upd);

  closeModal();
  Utils.toast('报价已创建');
  Router.handleRoute();
  return false;
}

// 导入数据（带客户去重，同步跟进记录和报价）
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const raw = JSON.parse(e.target.result);
      const importCustomers = Array.isArray(raw.customers) ? raw.customers : (Array.isArray(raw) ? raw : []);
      const importFollowups = Array.isArray(raw.followups) ? raw.followups : [];
      const importQuotations = Array.isArray(raw.quotations) ? raw.quotations : [];
      const importSocialMedia = raw.socialMedia || null;
      const importScripts = Array.isArray(raw.scripts) ? raw.scripts : [];
      const importCompetitors = Array.isArray(raw.competitors) ? raw.competitors : [];
      const importFaq = Array.isArray(raw.faq) ? raw.faq : [];

      if (importCustomers.length === 0) {
        Utils.toast('文件中没有找到客户数据');
        event.target.value = '';
        return;
      }

      const existingCustomers = Storage.getCustomers();
      const skipped = [];
      let newCount = 0;
      let mergedCount = 0;
      const oldIdNewIdMap = {};  // 记录旧ID → 新ID的映射

      for (const ic of importCustomers) {
        if (!ic.name) continue;
        const icEmail = (ic.email || '').toLowerCase().trim();
        const icWhatsapp = (ic.whatsapp || '').replace(/[\s\-\+\(\)]/g, '');
        const icName = (ic.name || '').trim();
        const icCountry = (ic.country || '').trim();
        const oldId = ic.id;  // 保存旧ID

        // 查找重复（同时获得索引，避免重复遍历）
        const existIdx = existingCustomers.findIndex(ec => {
          if (icEmail && ec.email && ec.email.toLowerCase().trim() === icEmail) return true;
          if (icWhatsapp && ec.whatsapp) {
            const ecWhatsapp = ec.whatsapp.replace(/[\s\-\+\(\)]/g, '');
            if (ecWhatsapp === icWhatsapp) return true;
          }
          if (icName && icCountry && ec.name && ec.name.trim() === icName && ec.country && ec.country.trim() === icCountry) return true;
          return false;
        });

        if (existIdx !== -1) {
          // 重复客户：合并非空字段（包括 false/0 等合法值）
          const ec = existingCustomers[existIdx];
          if (oldId) oldIdNewIdMap[oldId] = ec.id; // 建立旧ID到已有客户ID的映射，用于导入跟进/报价记录
          const fieldsToMerge = [
            'companySize','contactPerson','email','whatsapp','website','source',
            'techContact','firstContactDate','foundedDate',
            'currentCapacity','currentEquipment','mainIndustries','corePainPoints',
            'mainProduct','targetEquipment','equipmentSpecs','budget',
            'expectedPurchaseTime','needsFactoryInspection','stage','priority','nextFollowUp','tags'
          ];
          let hasUpdate = false;
          for (const f of fieldsToMerge) {
            if (ic[f] !== undefined && ic[f] !== null) {
              if (typeof ic[f] === 'string') {
                if (ic[f] !== '') { ec[f] = ic[f]; hasUpdate = true; }
              } else if (Array.isArray(ic[f])) {
                if (ic[f].length > 0) { ec[f] = ic[f]; hasUpdate = true; }
              } else {
                // 布尔值、数字等直接合并
                ec[f] = ic[f]; hasUpdate = true;
              }
            }
          }
          if (hasUpdate) {
            ec.updatedAt = new Date().toISOString();
            mergedCount++;
          } else {
            skipped.push(ic.name);
          }
        } else {
          const newId = Utils.id();
          if (oldId) oldIdNewIdMap[oldId] = newId;
          ic.id = newId;
          ic.createdAt = new Date().toISOString();
          ic.updatedAt = ic.createdAt;
          existingCustomers.push(ic);
          newCount++;
        }
      }

      // 导入跟进记录（根据映射更新 customerId，基于内容去重）
      const existingFollowups = Storage.getFollowups();
      const followupKeySet = new Set(existingFollowups.map(f => (f.customerId || '') + '|' + (f.type || '') + '|' + (f.content || '') + '|' + (f.createdAt || '').slice(0, 10)));
      let followupCount = 0;
      for (const f of importFollowups) {
        const mappedId = f.customerId && oldIdNewIdMap[f.customerId];
        if (!mappedId) continue;  // 客户未导入，跳过
        const key = mappedId + '|' + (f.type || '') + '|' + (f.content || '') + '|' + (f.createdAt || '').slice(0, 10);
        if (followupKeySet.has(key)) continue; // 已有相同内容，跳过
        followupKeySet.add(key);
        f.id = Utils.id();
        f.customerId = mappedId;
        f.createdAt = f.createdAt || new Date().toISOString();
        existingFollowups.push(f);
        followupCount++;
      }

      // 导入报价记录（根据映射更新 customerId，基于内容去重）
      const existingQuotations = Storage.getQuotations();
      const quotationKeySet = new Set(existingQuotations.map(q => (q.customerId || '') + '|' + (q.name || '') + '|' + (q.amount || '') + '|' + (q.createdAt || '').slice(0, 10)));
      let quotationCount = 0;
      for (const q of importQuotations) {
        const mappedId = q.customerId && oldIdNewIdMap[q.customerId];
        if (!mappedId) continue;
        const key = mappedId + '|' + (q.name || '') + '|' + (q.amount || '') + '|' + (q.createdAt || '').slice(0, 10);
        if (quotationKeySet.has(key)) continue; // 已有相同内容，跳过
        quotationKeySet.add(key);
        q.id = Utils.id();
        q.customerId = mappedId;
        q.createdAt = q.createdAt || new Date().toISOString();
        q.updatedAt = q.updatedAt || q.createdAt;
        existingQuotations.push(q);
        quotationCount++;
      }

      Storage.setCustomers(existingCustomers);
      Storage.setFollowups(existingFollowups);
      Storage.setQuotations(existingQuotations);

      // 导入社媒管理
      let socialMediaCount = 0;
      if (importSocialMedia) {
        const sm = Storage.getSocialMedia();
        if (Array.isArray(importSocialMedia.schedules)) {
          for (const s of importSocialMedia.schedules) { s.id = Utils.id(); sm.schedules.push(s); socialMediaCount++; }
        }
        if (Array.isArray(importSocialMedia.drafts)) {
          for (const d of importSocialMedia.drafts) { d.id = Utils.id(); sm.drafts.push(d); socialMediaCount++; }
        }
        if (Array.isArray(importSocialMedia.posts)) {
          for (const p of importSocialMedia.posts) { p.id = Utils.id(); sm.posts.push(p); socialMediaCount++; }
        }
        Storage.setSocialMedia(sm);
      }

      // 导入话术管理
      let scriptCount = 0;
      const existingScripts = Storage.getScripts();
      for (const s of importScripts) { s.id = Utils.id(); existingScripts.push(s); scriptCount++; }
      if (scriptCount > 0) Storage.setScripts(existingScripts);

      // 导入对手库
      let competitorCount = 0;
      const existingCompetitors = Storage.getCompetitors();
      for (const c of importCompetitors) { c.id = Utils.id(); existingCompetitors.push(c); competitorCount++; }
      if (competitorCount > 0) Storage.setCompetitors(existingCompetitors);

      // 导入专业问题
      let faqCount = 0;
      const existingFaq = Storage.getFaq();
      for (const f of importFaq) { f.id = Utils.id(); existingFaq.push(f); faqCount++; }
      if (faqCount > 0) Storage.setFaq(existingFaq);

      showImportResult(importCustomers.length, newCount, mergedCount, skipped.length, skipped, followupCount, quotationCount, socialMediaCount, scriptCount, faqCount, competitorCount, 0);

      event.target.value = '';
      Router.handleRoute();
    } catch(err) {
      Utils.toast('文件解析失败，请检查文件格式');
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

// 导出客户为Markdown
function exportCustomerMarkdown(id) {
  const c = Utils.getCustomer(id);
  if (!c) { Utils.toast('客户不存在'); return; }

  const pri = Utils.getPriority(c.priority);
  const followups = Utils.getCustomerFollowups(id);
  const quotations = Utils.getCustomerQuotations(id);

  let md = `# ${c.name}

> 纸箱机械 CRM 客户资料导出 · ${Utils.today()}

---

## 基本信息

| 字段 | 内容 |
|------|------|
| 国家 | ${c.country || '-'} |
| 企业规模 | ${c.companySize || '-'} |
| 联系人 | ${c.contactPerson || '-'} |
| 邮箱 | ${c.email || '-'} |
| WhatsApp | ${c.whatsapp || '-'} |
| 官网 | ${c.website || '-'} |
| 客户来源 | ${c.source || '-'} |
| 技术负责人 | ${c.techContact || '-'} |
| 首次联系日期 | ${c.firstContactDate || '-'} |
| 成立时间 | ${c.foundedDate || '-'} |
| 主营产品 | ${c.mainProduct || '-'} |

## 工厂画像

| 字段 | 内容 |
|------|------|
| 现有产能 | ${c.currentCapacity || '-'} |
| 现有设备 | ${c.currentEquipment || '-'} |
| 主要下游行业 | ${c.mainIndustries || '-'} |
| 核心痛点 | ${c.corePainPoints || '-'} |

## 采购需求

| 字段 | 内容 |
|------|------|
| 意向设备 | ${(c.targetEquipment || []).join(', ') || '-'} |
| 设备规格 | ${c.equipmentSpecs || '-'} |
| 预算 | ${c.budget || '-'} |
| 预计采购时间 | ${c.expectedPurchaseTime || '-'} |
| 是否需要验厂 | ${c.needsFactoryInspection ? '是' : '否'} |

## 跟进状态

- **优先级**: ${pri.value} (${pri.label})
- **当前阶段**: ${c.stage || '未设置'}
- **下次跟进**: ${c.nextFollowUp || '未设置'}

`;

  if (followups.length > 0) {
    md += `## 跟进记录 (${followups.length} 条)\n\n`;
    for (const f of followups) {
      md += `### ${f.date} - ${f.method}\n\n`;
      md += `${f.content || '无内容'}\n\n`;
      if (f.nextAction) md += `下一步行动: ${f.nextAction}\n`;
      if (f.nextFollowUpDate) md += `下次跟进: ${f.nextFollowUpDate}\n`;
      md += `\n---\n\n`;
    }
  }

  if (c.tags && c.tags.length) {
    md += `## 客户标签\n\n${c.tags.map(t => `- ${t}`).join('\n')}\n\n`;
  }

  if (quotations.length > 0) {
    md += `## 报价记录 (${quotations.length} 份)\n\n`;
    for (const q of quotations) {
      const qs = Utils.getQuoteStatus(q.status);
      md += `### ${q.quoteNumber} - ${qs.label}\n`;
      md += `日期: ${q.date} | 金额: $${(q.totalAmount || 0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})} USD\n\n`;
      md += `| 设备 | 型号 | 数量 | 单价 (USD) | 小计 (USD) |\n`;
      md += `|------|------|------|------|------|\n`;
      for (const item of q.items) {
        md += `| ${item.name} | ${item.model || '-'} | ${item.quantity} | $${(item.unitPrice||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})} | $${(item.totalPrice||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})} |\n`;
      }
      md += `\n`;
      if (q.paymentTerms) md += `付款条款: ${q.paymentTerms}\n`;
      if (q.deliveryTerms) md += `交货条款: ${q.deliveryTerms}\n`;
      if (q.notes) md += `备注: ${q.notes}\n`;
      md += `\n---\n\n`;
    }
  }

  const filename = c.name + '-客户资料-' + Utils.today() + '.md';
  Utils.download(filename, md, 'text/markdown');
  Utils.toast('Markdown 已导出');
}

// 全局键盘快捷键
document.addEventListener('keydown', function(e) {
  const tag = e.target.tagName;
  if ((tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') && e.key !== 'Escape') return;
  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
  const mod = isMac ? e.metaKey : e.ctrlKey;
  if (mod && e.key === 'n') { e.preventDefault(); showCustomerForm(); }
  if (mod && e.key === 'f') {
    e.preventDefault();
    const el = document.getElementById('cust-search');
    if (el) { el.focus(); el.select(); }
  }
  if (mod && e.key === '1') { e.preventDefault(); Router.navigate('/'); }
  if (mod && e.key === '2') { e.preventDefault(); Router.navigate('/customers'); }
  if (mod && e.key === '3') { e.preventDefault(); Router.navigate('/quotations'); }
  if (mod && e.key === '4') { e.preventDefault(); Router.navigate('/settings'); }
  if (mod && e.key === '5') { e.preventDefault(); Router.navigate('/social-media'); }
  if (mod && e.key === '6') { e.preventDefault(); Router.navigate('/scripts'); }
  if (mod && e.key === '7') { e.preventDefault(); Router.navigate('/competitors'); }
  if (mod && e.key === '8') { e.preventDefault(); Router.navigate('/faq'); }
  if (mod && e.key === '9') { e.preventDefault(); Router.navigate('/calculator'); }
  if (mod && e.key === '0') { e.preventDefault(); Router.navigate('/simulation'); }
  if (e.key === 'Escape') { closeModal(); }
  const route = Router.currentRoute || '';
  if (route.indexOf('/customer?id=') >= 0 || route.indexOf('/customer?') >= 0) {
    const m = route.match(/id=([^&]*)/);
    const cid = m ? m[1] : null;
    if (cid) {
      if (e.key === 'e' || e.key === 'E') { e.preventDefault(); showCustomerForm(cid); }
      if (e.key === 'f' || e.key === 'F') { e.preventDefault(); showFollowUpForm(cid); }
      if (e.key === 'q' || e.key === 'Q') {
        e.preventDefault();
        const c = Utils.getCustomer(cid);
        showQuotationForm(cid, c ? c.name : '');
      }
      if (e.key === 'd' || e.key === 'D') { e.preventDefault(); deleteCustomer(cid); }
    }
  }
});

// 自动保存草稿系统
const DraftSystem = {
  save(formType, id, formData) {
    const key = 'draft-' + formType + '-' + (id || 'new');
    const draft = { data: formData, savedAt: new Date().toISOString(), formType: formType, id: id || 'new' };
    try { localStorage.setItem(key, JSON.stringify(draft)); } catch(e) {}
    this.showHint();
  },
  load(formType, id) {
    const key = 'draft-' + formType + '-' + (id || 'new');
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      const draft = JSON.parse(raw);
      if (Date.now() - new Date(draft.savedAt).getTime() > 7 * 86400000) { localStorage.removeItem(key); return null; }
      return draft;
    } catch(e) { return null; }
  },
  delete(formType, id) {
    localStorage.removeItem('draft-' + formType + '-' + (id || 'new'));
  },
  startAutoSave(formType, id, getDataFn) {
    this._timerId = this._timerId || {};
    const uid = formType + '_' + (id || 'new');
    if (this._timerId[uid]) clearInterval(this._timerId[uid]);
    this._timerId[uid] = setInterval(function() {
      var data = getDataFn();
      if (data) DraftSystem.save(formType, id, data);
    }, 500);
  },
  stopAutoSave(formType, id) {
    const uid = formType + '_' + (id || 'new');
    if (this._timerId && this._timerId[uid]) { clearInterval(this._timerId[uid]); delete this._timerId[uid]; }
  },
  showHint() {
    document.querySelectorAll('.auto-save-hint').forEach(function(el) {
      el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, 2000);
    });
  }
};

// 搜索历史
const SearchHistory = {
  get() {
    try { return JSON.parse(localStorage.getItem('crm_search_history') || '[]'); } catch(e) { return []; }
  },
  add(q) {
    if (!q || !q.trim()) return;
    var h = this.get();
    h = h.filter(function(s) { return s.toLowerCase() !== q.toLowerCase(); });
    h.unshift(q);
    if (h.length > 10) h = h.slice(0, 10);
    localStorage.setItem('crm_search_history', JSON.stringify(h));
  },
  clear() { localStorage.removeItem('crm_search_history'); }
};

  setEnabled(v) { localStorage.setItem('crm_auto_backup', v ? '1' : '0'); },
  getLastBackup() { return localStorage.getItem('crm_last_auto_backup') || ''; },

// 滚动位置记忆
const ScrollMemory = {
  save(key) {
    var el = document.getElementById('page-content');
    if (el) localStorage.setItem('scr_' + key, String(el.scrollTop));
  },
  restore(key) {
    var pos = localStorage.getItem('scr_' + key);
    if (pos) {

        var el = document.getElementById('page-content');

// 报价单快速复制
function copyQuotation(id) {

  var q = quotes.find(function(x) { return x.id === id; });
  if (!q) { Utils.toast('\u62A5\u4EF7\u5355\u4E0D\u5B58\u5728'); return; }
  var copy = JSON.parse(JSON.stringify(q));
  copy.id = Utils.id();
  copy.quoteNumber = Utils.nextQuoteNumber();
  copy.date = Utils.today();
  copy.status = 'draft';
  copy.createdAt = new Date().toISOString();

    } else if (phase === 'negotiation') {
      replies = [
        '技术条款我们可以接受。但付款方式要改成：预付30%，发货前付60%，验收后付10%。',
        '我们需要你们提供详细的技术承诺书。包括精度、速度、故障率等指标。',
        '可以签合同。但你们要承诺：如果技术指标达不到，要退货退款。'
      ];
    }
  }
  
  // 决策老板的回复
  if (simState.customerRole.indexOf('决策老板') !== -1) {
    if (phase === 'greeting') {
      replies = [
        '你好。我们公司正在扩大产能，需要增加生产线。你们有什么推荐？',
        '我是公司的老板。我想了解一下你们设备的投资回报情况。',
        '我们打算投资一条新的纸箱生产线。你们能做整线方案吗？'
      ];
    } else if (phase === 'intro') {
      replies = [
        '投资回报期多长？我们算了一下，大概需要2年才能回本。',
        '你们和其他品牌比，优势在哪里？为什么我们要选你们而不是德国机器？',
        '你们公司做了多久了？有没有可能做不下去，我们的保修就没了？'
      ];
    } else if (phase === 'qa') {
      replies = [
        '保修期外的维修费用高吗？你们配件价格怎么样？',
        '如果机器出现问题，影响生产，你们怎么赔偿？',
        '你们能提供金融方案吗？我们可以接受融资租赁。'
      ];
    } else if (phase === 'quote') {
      replies = [
        '报价我看了。总投资要50万美元，有点高。能不能降到45万？',
        '这个报价是FOB价还是CIF价？运费和保险费谁出？',
        '如果一次性订整条生产线，能给多少折扣？'
      ];
    } else if (phase === 'negotiation') {
      replies = [
        '好吧，就按45万美元。但你们要承诺18个月内回本，否则要补偿。',
        '合同可以签。但我要加一条：如果机器故障导致停产，你们要按天赔偿。',
        '可以。什么时候能开始执行合同？我们要尽快投产。'
      ];
    }
  }
  
  // 根据难度级别调整回复（困难模式下，客户会更挑剔）
  if (simState.difficulty === '困难') {
    // 有30%概率客户会提出额外要求或质疑
    if (Math.random() < 0.3) {
      replies.push('这个我还是不太满意。你们能不能再改进一下方案？');
      replies.push('我听说你们竞争对手的价格更便宜。为什么我们要选你们？');
      replies.push('我们需要再考虑考虑。这几天我会再联系你们的。');
    }
  }
  
  // 过滤掉已讨论过的话题（避免重复）
  var filteredReplies = [];
  for (var i = 0; i < replies.length; i++) {
    var reply = replies[i];
    var isDuplicate = false;
    for (var j = 0; j < simState.askedQuestions.length; j++) {
      if (reply.indexOf(simState.askedQuestions[j]) !== -1) {
        isDuplicate = true;
        break;
      }
    }
    if (!isDuplicate) {
      filteredReplies.push(reply);
    }
  }
  
  // 如果过滤后没有回复了，就使用原始回复列表
  if (filteredReplies.length === 0) {
    filteredReplies = replies;
  }
  
  // 随机选择一条回复
  var selectedReply = filteredReplies[Math.floor(Math.random() * filteredReplies.length)];
  
  // 将讨论的话题添加到 askedQuestions
  // 简单提取关键词（取回复的前20个字符作为话题标识）
  var topic = selectedReply.substring(0, 20);
  simState.askedQuestions.push(topic);
  
  return selectedReply;
}

function simAddMsg(who, text) {
  var body = document.getElementById('sim-chat-body');
  if (!body) return;
  var now = new Date();
  var timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  var div = document.createElement('div');
  div.className = 'sim-msg sim-msg-' + who;
  div.innerHTML = '<div class="sim-msg-bubble">' + text + '</div><div class="sim-msg-time">' + timeStr + '</div>';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  simState.messages.push({ who: who, text: text, time: now.toISOString() });
}

function simSend() {
  var input = document.getElementById('sim-input');
  var text = input.value.trim();
  if (!text) return;
  simAddMsg('user', text);
  input.value = '';
  input.style.height = 'auto';

  // 更新分数（简单关键词检测）
  simScore(text);

  // 模拟打字效果
  var body = document.getElementById('sim-chat-body');
  var typing = document.createElement('div');
  typing.className = 'sim-msg sim-msg-cust';
  typing.id = 'sim-typing';
  typing.innerHTML = '<div class="sim-msg-bubble" style="opacity:0.5;">正在输入...</div>';
  body.appendChild(typing);
  body.scrollTop = body.scrollHeight;

  setTimeout(function() {
    var el = document.getElementById('sim-typing');
    if (el) el.remove();
    var phaseNames = ['greeting','intro','qa','quote','negotiation'];
    var nextPhase = simState.phase < 4 ? phaseNames[simState.phase + 1] : phaseNames[4];
    // 有30%概率推进阶段
    if (Math.random() < 0.3 && simState.phase < 4) {
      simState.phase++;
      simUpdateDots();
    }
    var reply = simGenReply(nextPhase);
    simAddMsg('cust', reply);
  }, 1000 + Math.random() * 2000);
}

function simScore(text) {
  var t = text.toLowerCase();
  // 专业性：提到技术参数、公司优势
  if (t.match(/speed|precision|accuracy|efficiency|warranty|experience|year|iso|ce/)) simState.scores.professional += 1;
  // 响应性：回复长度适中
  if (text.length > 20 && text.length < 500) simState.scores.responsiveness += 1;
  // 产品知识
  if (t.match(/flexo|printer|slotter|die.cut|hy-1224|hy-1428|corrugat/)) simState.scores.productKnowledge += 1;
  // 谈判技巧
  if (t.match(/discount|price|delivery|payment|install|training|free|extra/)) simState.scores.negotiation += 1;
}

function simUpdateDots() {
  for (var i = 0; i < simState.phases.length; i++) {
    var dot = document.getElementById('sim-dot-' + i);
    if (dot) dot.classList.toggle('active', i <= simState.phase);
  }
}

function simSuggest() {
  var phaseNames = ['开场','需求挖掘','产品介绍','报价讨论','谈判/成交'];
  var currentPhase = phaseNames[simState.phase] || '开场';
  var suggestions = [];
  var improvements = [];

  if (simState.phase === 0) {
    suggestions = [
      '🎯 简要介绍公司和核心优势（25年经验、13年销量第一）',
      '📎 主动提供产品目录（PDF或视频链接）',
      '❓ 询问客户当前使用的设备和痛点',
      '⏰ 注意：主动开发时不要太push，保持礼貌'
    ];
    improvements = ['介绍公司时突出差异化优势','询问客户现状以了解需求'];
  } else if (simState.phase === 1) {
    suggestions = [
      '📊 根据客户需求推荐合适型号（不要推最贵的）',
      '🏭 分享同地区成功案例（增加信任感）',
      '🎥 提供机器运行视频（比图片更有说服力）',
      '💰 提前准备好价格区间，但不要立即报死价'
    ];
    improvements = ['推荐型号要匹配客户需求','提供社会证明（案例）'];
  } else if (simState.phase === 2) {
    suggestions = [
      '✅ 详细回答技术参数问题，展示专业性',
      '🛠 强调售后服务（安装、培训、备件）',
      '🌍 说明海外服务能力和响应时间',
      '💳 主动提及付款方式（LC、TT等）'
    ];
    improvements = ['回答要专业且简洁','主动解决客户顾虑'];
  } else if (simState.phase === 3) {
    suggestions = [
      '📄 报价单要详细（型号、配置、交期、付款条款）',
      '🎁 可以预留一些谈判空间（但不要虚高）',
      '🚢 主动说明贸易术语（FOB、CIF等）',
      '⏳ 设置报价有效期，创造紧迫感'
    ];
    improvements = ['报价要专业且完整','预留谈判空间'];
  } else {
    suggestions = [
      '🤝 倾听客户的顾虑，不要急于反驳',
      '💡 提供额外的价值（免费配件、延长保修等）',
      '📝 确认所有细节，准备合同',
      '📞 如果客户犹豫，建议视频会议深入沟通'
    ];
    improvements = ['谈判要有耐心','寻找双赢方案'];
  }

  // 分析已发送的消息，给出针对性建议
  var userMsgs = simState.messages.filter(function(m) { return m.who === 'user'; });
  var lastUserMsg = userMsgs.length > 0 ? userMsgs[userMsgs.length - 1].text : '';

  var html = '<div style="font-size:15px;font-weight:600;margin-bottom:12px;color:var(--apple-blue);">💡 沟通建议（当前阶段：' + currentPhase + '）</div>';
  html += '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">以下是针对当前沟通阶段的建议：</div>';
  html += '<ul class="sim-summary-list sim-summary-tip" style="margin-bottom:16px;">';
  for (var s = 0; s < suggestions.length; s++) {
    html += '<li>' + suggestions[s] + '</li>';
  }
  html += '</ul>';
  html += '<div style="font-size:13px;font-weight:600;color:var(--apple-green);margin-bottom:8px;">📈 可改进方向</div>';
  html += '<ul class="sim-summary-list sim-summary-tip">';
  for (var i = 0; i < improvements.length; i++) {
    html += '<li>' + improvements[i] + '</li>';
  }
  html += '</ul>';

  if (lastUserMsg) {
    html += '<div style="margin-top:16px;padding:12px;background:rgba(0,122,255,0.05);border-radius:10px;font-size:12px;color:var(--text-secondary);">';
    html += '<div style="font-weight:600;margin-bottom:6px;">您上一条回复分析：</div>';
    html += '<div style="line-height:1.6;">';
    if (lastUserMsg.length < 20) html += '⚠️ 回复偏短，可以更安全详细地介绍产品和公司优势。<br>';
    if (!lastUserMsg.match(/\?[？]/)) html += '💡 可以提一个开放式问题，引导客户多说一些需求。<br>';
    if (lastUserMsg.match(/price|discount|cheap/)) html += '✅ 主动讨论价格是好的，但先建立价值再谈价格效果更好。';
    if (!lastUserMsg.match(/[？\?]/) && lastUserMsg.length > 50) html += '👍 回复内容充实，建议加一个问题让对话继续。';
    html += '</div></div>';
  }

  openModal(html);
}

function simEnd() {
  if (!simState) return;
  var duration = Math.round((Date.now() - simState.startTime) / 1000 / 60 * 10) / 10;
  var msgCount = simState.messages.length;
  var userMsgCount = 0;
  
  // 计算用户消息数量
  for (var i = 0; i < simState.messages.length; i++) {
    if (simState.messages[i].who === 'user') userMsgCount++;
  }

  // 生成总结
  var goodPoints = [];
  var badPoints = [];
  var tips = [];

  // 根据分数分析
  if (simState.scores.professional >= 2) {
    goodPoints.push('专业性表现好，能准确提及产品技术参数');
  } else {
    badPoints.push('可以更多地提及产品技术参数和公司优势，建立专业形象');
  }

  if (simState.scores.productKnowledge >= 1) {
    goodPoints.push('产品知识运用得当，能结合产品特点沟通');
  } else {
    badPoints.push('建议提前准备好产品资料，更流畅地介绍产品特点');
  }

  if (simState.scores.negotiation >= 1) {
    goodPoints.push('谈判技巧运用合理，能主动讨论价格和条款');
  } else {
    tips.push('谈判阶段可以主动提出一些flexible的方案，如折扣条件、额外配件等');
  }

  if (userMsgCount >= 4) {
    goodPoints.push('沟通充分，多次主动回复客户');
  } else {
    tips.push('可以多问开放式问题，引导客户表达更多需求');
  }

  if (simState.phase >= 3) {
    goodPoints.push('成功推进到较深沟通阶段（' + simState.phases[simState.phase] + '）');
  } else {
    badPoints.push('沟通阶段推进较慢，可以尝试更主动地引导对话向深处发展');
  }

  // 默认补充
  if (goodPoints.length === 0) goodPoints.push('完成了一次完整的模拟沟通练习');
  if (badPoints.length === 0) badPoints.push('整体表现良好，继续保持');
  tips.push('每次主动开发前，提前准备好客户背景资料和对话提纲');
  tips.push('定期练习，熟悉产品介绍话术和常见Q&A');

  // 构建HTML - 使用字符串拼接，避免模板字符串
  var html = '<div class="sim-summary">' +
    '<div class="sim-summary-title">📊 模拟沟通总结</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">' +
      '<div style="padding:12px;background:rgba(0,122,255,0.05);border-radius:10px;text-align:center;">' +
        '<div style="font-size:12px;color:var(--text-secondary);">沟通时长</div>' +
        '<div style="font-size:24px;font-weight:700;color:var(--apple-blue);">' + (duration < 1 ? '<1' : duration) + ' 分钟</div>' +
      '</div>' +
      '<div style="padding:12px;background:rgba(52,199,89,0.05);border-radius:10px;text-align:center;">' +
        '<div style="font-size:12px;color:var(--text-secondary);">对话轮次</div>' +
        '<div style="font-size:24px;font-weight:700;color:var(--apple-green);">' + msgCount + ' 条</div>' +
      '</div>' +
      '<div style="padding:12px;background:rgba(255,149,0,0.05);border-radius:10px;text-align:center;">' +
        '<div style="font-size:12px;color:var(--text-secondary);">推进阶段</div>' +
        '<div style="font-size:20px;font-weight:700;color:var(--apple-orange);">' + simState.phases[simState.phase] + '</div>' +
      '</div>' +
      '<div style="padding:12px;background:rgba(175,82,222,0.05);border-radius:10px;text-align:center;">' +
        '<div style="font-size:12px;color:var(--text-secondary);">您的回复</div>' +
        '<div style="font-size:24px;font-weight:700;color:#AF52DE;">' + userMsgCount + ' 条</div>' +
      '</div>' +
    '</div>' +
    '<div class="sim-summary-section">' +
      '<div class="sim-summary-label" style="color:var(--apple-green);">✅ 表现好的方面</div>' +
      '<ul class="sim-summary-list sim-summary-good">';
  
  for (var g = 0; g < goodPoints.length; g++) {
    html += '<li>' + goodPoints[g] + '</li>';
  }
  
  html += '</ul>' +
    '</div>' +
    '<div class="sim-summary-section">' +
      '<div class="sim-summary-label" style="color:var(--apple-red);">⚠️ 需要改进的方面</div>' +
      '<ul class="sim-summary-list sim-summary-bad">';
  
  for (var b = 0; b < badPoints.length; b++) {
    html += '<li>' + badPoints[b] + '</li>';
  }
  
  html += '</ul>' +
    '</div>' +
    '<div class="sim-summary-section">' +
      '<div class="sim-summary-label" style="color:var(--apple-orange);">💡 日后改进建议</div>' +
      '<ul class="sim-summary-list sim-summary-tip">';
  
  for (var t = 0; t < tips.length; t++) {
    html += '<li>' + tips[t] + '</li>';
  }
  
  html += '</ul>' +
    '</div>' +
    '<button class="btn btn-primary" onclick="closeModal()" style="width:100%;margin-top:20px;">完成</button>' +
  '</div>';

  document.getElementById('sim-chat-container').innerHTML = '';
  openModal(html);
  simState = null;
}

</script>
